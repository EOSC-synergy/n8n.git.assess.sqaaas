      github.com/n8n-io/n8n flake8:
        commands:
        - /usr/bin/env sh .sqa/script.leaky-pumpkin-wombat.sh
        container: qc.sty_skinny-myrtle-vole
      github.com/n8n-io/n8n hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.fuzzy-sapphire-moose.sh
        container: qc.sty_skinny-maroon-dalmatian
      github.com/n8n-io/n8n jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.boozy-viridian-bison.sh
        container: qc.sty_cheeky-coral-emu
  QC.Uni:
    repos:
      github.com/n8n-io/n8n pytest:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-white-setter.sh
        container: qc.uni_lousy-denim-beaver
