config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/Ophidia
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/n8n-io/n8n:
      branch: master
      repo: https://github.com/n8n-io/n8n.git
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/n8n-io/n8n git:
        commands:
        - /usr/bin/env sh .sqa/script.crappy-smalt-seahorse.sh
        container: qc.acc_hilly-aquamarine-bobcat
  QC.Doc:
    repos:
      github.com/n8n-io/n8n find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.wheezy-amber-lion.sh
        container: qc.doc_leaky-purple-macaque
      github.com/n8n-io/n8n git:
        commands:
        - /usr/bin/env sh .sqa/script.lumpy-charcoal-mau.sh
        container: qc.doc_crabby-azure-albatross
      github.com/n8n-io/n8n markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.jumpy-cerise-sparrow.sh
        container: qc.doc_slaphappy-magenta-monster
  QC.Lic:
    repos:
      github.com/n8n-io/n8n licensee:
        commands:
        - /usr/bin/env sh .sqa/script.gamy-blue-tang.sh
        container: qc.lic_homely-chestnut-chipmunk
  QC.Sec:
    repos:
      github.com/n8n-io/n8n bandit:
        commands:
        - /usr/bin/env sh .sqa/script.sickly-brown-sponge.sh
        container: qc.sec_blurry-lavender-dachshund
  QC.Sty:
